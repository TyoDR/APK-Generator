name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Ekstrak File ZIP
      run: unzip nes-emulator.zip -d project_folder 
    
    - name: Jurus Pamungkas (Injeksi JS & Fix Layar Transparan)
      run: |
        python -c '
        import os, urllib.request
        
        # Download mesin JSNES stabil
        url = "https://cdn.jsdelivr.net/npm/jsnes@1.2.0/dist/jsnes.min.js"
        js_code = urllib.request.urlopen(url).read().decode("utf-8")
        
        # Cari file index.html
        html_path = None
        for root, dirs, files in os.walk("project_folder"):
            if "index.html" in files:
                html_path = os.path.join(root, "index.html")
                break
                
        if html_path:
            with open(html_path, "r", encoding="utf-8") as f:
                html = f.read()
            
            # 1. Suntik JSNES ke dalam HTML agar lolos blokir Android
            html = html.replace("<script src=\"jsnes.min.js\"></script>", f"<script>\n{js_code}\n</script>")
            
            # 2. FIX LAYAR HITAM: Paksa Alpha Channel (Transparansi) jadi 255 (Solid) di setiap frame!
            html = html.replace("data[i * 4 + 2] = pixel & 0xFF;", "data[i * 4 + 2] = pixel & 0xFF;\n          data[i * 4 + 3] = 255;")
            
            with open(html_path, "w", encoding="utf-8") as f:
                f.write(html)
        '
        
        # 3. Paksa Kotlin agar Base64 lurus tanpa Enter (Mencegah JS Crash)
        find project_folder -name "*.kt" -exec sed -i "s/Base64\.DEFAULT/Base64.NO_WRAP/g" {} +
        
    - name: Akali File Tersembunyi yang Hilang
      run: |
        cd project_folder
        touch .env.example
        touch .env
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Buat Gradle Wrapper & Berikan Izin
      run: |
        cd project_folder
        gradle wrapper
        chmod +x gradlew

    - name: Hapus Aturan Keystore yang Error
      run: |
        cd project_folder
        sed -i "s/signingConfig =/\/\/ signingConfig =/g" app/build.gradle.kts || true

    - name: Build APK dengan Gradle
      run: |
        cd project_folder
        ./gradlew assembleDebug

    - name: Upload APK Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: NES-Emulator-App 
        path: project_folder/app/build/outputs/apk/debug/app-debug.apk
