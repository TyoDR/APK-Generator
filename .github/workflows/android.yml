name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Ekstrak File ZIP
      run: unzip nes-emulator.zip -d project_folder 
    
    - name: Download Mesin JSNES Otomatis
      run: |
        ASSETS_DIR=$(find project_folder -type d -name "assets" | head -n 1)
        curl -L -o "$ASSETS_DIR/jsnes.min.js" https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js

    - name: Akali File Tersembunyi yang Hilang
      run: |
        cd project_folder
        touch .env.example
        touch .env
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Buat Gradle Wrapper & Berikan Izin
      run: |
        cd project_folder
        gradle wrapper
        chmod +x gradlew

    - name: Hapus Aturan Keystore yang Error
      run: |
        cd project_folder
        sed -i 's/signingConfig =/\/\/ signingConfig =/g' app/build.gradle.kts

    - name: Build APK dengan Gradle
      run: |
        cd project_folder
        ./gradlew assembleDebug

    - name: Upload APK Hasil Build
      uses: actions/upload-artifact@v4
      with:
        name: NES-Emulator-App 
        path: project_folder/app/build/outputs/apk/debug/app-debug.apk
